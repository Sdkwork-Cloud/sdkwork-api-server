name: release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      git_ref: ${{ steps.resolve.outputs.git_ref }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            git_ref="${GITHUB_REF}"
          else
            release_tag="${{ github.event.inputs.release_tag }}"
            git_ref="${{ github.event.inputs.git_ref }}"
            if [[ -z "$git_ref" ]]; then
              git_ref="refs/tags/$release_tag"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "git_ref=$git_ref" >> "$GITHUB_OUTPUT"

  native-release:
    name: Native release (${{ matrix.platform }}-${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
          - runner: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          - runner: macos-14
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            apps/sdkwork-router-admin/pnpm-lock.yaml
            apps/sdkwork-router-portal/pnpm-lock.yaml
            console/pnpm-lock.yaml
            docs/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install native workspace dependencies
        shell: bash
        run: |
          pnpm --dir apps/sdkwork-router-admin install --frozen-lockfile
          pnpm --dir apps/sdkwork-router-portal install --frozen-lockfile
          pnpm --dir console install --frozen-lockfile

      - name: Build release service binaries on Windows
        if: matrix.platform == 'windows'
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
          HOST_CMAKE_GENERATOR: Visual Studio 17 2022
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p admin-api-service -p gateway-service -p portal-api-service -p router-web-service -p router-product-service

      - name: Build release service binaries on Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p admin-api-service -p gateway-service -p portal-api-service -p router-web-service -p router-product-service

      - name: Build admin desktop release
        shell: bash
        run: node scripts/release/run-desktop-release-build.mjs --app admin --target ${{ matrix.target }}

      - name: Build portal desktop release
        shell: bash
        run: node scripts/release/run-desktop-release-build.mjs --app portal --target ${{ matrix.target }}

      - name: Collect native release assets
        shell: bash
        run: node scripts/release/package-release-assets.mjs native --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --output-dir artifacts/release

      - name: Upload native release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/**/*
          if-no-files-found: error

  web-release:
    name: Web release assets
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            apps/sdkwork-router-admin/pnpm-lock.yaml
            apps/sdkwork-router-portal/pnpm-lock.yaml
            console/pnpm-lock.yaml
            docs/pnpm-lock.yaml

      - name: Install web workspace dependencies
        shell: bash
        run: |
          pnpm --dir apps/sdkwork-router-admin install --frozen-lockfile
          pnpm --dir apps/sdkwork-router-portal install --frozen-lockfile
          pnpm --dir console install --frozen-lockfile
          pnpm --dir docs install --frozen-lockfile

      - name: Build web release assets
        shell: bash
        run: |
          pnpm --dir apps/sdkwork-router-admin build
          pnpm --dir apps/sdkwork-router-portal build
          pnpm --dir console build
          pnpm --dir docs build

      - name: Package web release assets
        shell: bash
        run: node scripts/release/package-release-assets.mjs web --release-tag ${{ needs.prepare.outputs.release_tag }} --output-dir artifacts/release

      - name: Upload web release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-web
          path: artifacts/release/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - native-release
      - web-release
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: SDKWork API Router ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*
