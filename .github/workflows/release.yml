name: release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      git_ref: ${{ steps.resolve.outputs.git_ref }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            git_ref="${GITHUB_REF}"
          else
            release_tag="${{ github.event.inputs.release_tag }}"
            git_ref="${{ github.event.inputs.git_ref }}"
            if [[ -z "$git_ref" ]]; then
              git_ref="refs/tags/$release_tag"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "git_ref=$git_ref" >> "$GITHUB_OUTPUT"

  rust-dependency-audit:
    name: Rust dependency audit
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run release Rust dependency audit
        run: node scripts/check-rust-dependency-audit.mjs

  product-verification:
    name: Product verification
    needs:
      - prepare
      - rust-dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            apps/sdkwork-router-admin/pnpm-lock.yaml
            apps/sdkwork-router-portal/pnpm-lock.yaml
            docs/pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Materialize external release dependencies
        shell: bash
        env:
          SDKWORK_RELEASE_EXTERNAL_DEPENDENCY_SCOPE: referenced
          SDKWORK_CORE_GIT_REF: ${{ vars.SDKWORK_CORE_GIT_REF || 'main' }}
          SDKWORK_UI_GIT_REF: ${{ vars.SDKWORK_UI_GIT_REF || 'main' }}
          SDKWORK_APPBASE_GIT_REF: ${{ vars.SDKWORK_APPBASE_GIT_REF || 'main' }}
          SDKWORK_CRAW_CHAT_SDK_GIT_REF: ${{ vars.SDKWORK_CRAW_CHAT_SDK_GIT_REF || 'main' }}
        run: node scripts/release/materialize-external-deps.mjs

      - name: Install product verification workspace dependencies
        shell: bash
        run: |
          pnpm --dir apps/sdkwork-router-admin install --frozen-lockfile
          pnpm --dir apps/sdkwork-router-portal install --frozen-lockfile
          pnpm --dir docs install --frozen-lockfile

      - name: Build docs site
        shell: bash
        run: pnpm --dir docs build

      - name: Run release product verification
        env:
          SDKWORK_STRICT_FRONTEND_INSTALLS: '1'
        run: node scripts/check-router-product.mjs

  governance-release:
    name: Release governance
    needs:
      - prepare
      - rust-dependency-audit
      - product-verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Materialize external release dependencies
        shell: bash
        env:
          SDKWORK_RELEASE_EXTERNAL_DEPENDENCY_SCOPE: referenced
          SDKWORK_CORE_GIT_REF: ${{ vars.SDKWORK_CORE_GIT_REF || 'main' }}
          SDKWORK_UI_GIT_REF: ${{ vars.SDKWORK_UI_GIT_REF || 'main' }}
          SDKWORK_APPBASE_GIT_REF: ${{ vars.SDKWORK_APPBASE_GIT_REF || 'main' }}
          SDKWORK_CRAW_CHAT_SDK_GIT_REF: ${{ vars.SDKWORK_CRAW_CHAT_SDK_GIT_REF || 'main' }}
        run: node scripts/release/materialize-external-deps.mjs

      - name: Materialize release window snapshot
        shell: bash
        env:
          SDKWORK_RELEASE_WINDOW_SNAPSHOT_JSON: ${{ vars.SDKWORK_RELEASE_WINDOW_SNAPSHOT_JSON || '' }}
        run: node scripts/release/materialize-release-window-snapshot.mjs

      - name: Upload release window snapshot governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-window-snapshot
          path: docs/release/release-window-snapshot-latest.json
          if-no-files-found: error

      - name: Materialize release sync audit
        shell: bash
        env:
          SDKWORK_RELEASE_SYNC_AUDIT_PATH: docs/release/release-sync-audit-latest.json
          SDKWORK_RELEASE_SYNC_AUDIT_JSON: ${{ vars.SDKWORK_RELEASE_SYNC_AUDIT_JSON || '' }}
          SDKWORK_API_ROUTER_GIT_REF: ${{ needs.prepare.outputs.git_ref }}
          SDKWORK_CORE_GIT_REF: ${{ vars.SDKWORK_CORE_GIT_REF || 'main' }}
          SDKWORK_UI_GIT_REF: ${{ vars.SDKWORK_UI_GIT_REF || 'main' }}
          SDKWORK_APPBASE_GIT_REF: ${{ vars.SDKWORK_APPBASE_GIT_REF || 'main' }}
          SDKWORK_CRAW_CHAT_SDK_GIT_REF: ${{ vars.SDKWORK_CRAW_CHAT_SDK_GIT_REF || 'main' }}
        run: node scripts/release/materialize-release-sync-audit.mjs

      - name: Upload release sync audit governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-sync-audit
          path: docs/release/release-sync-audit-latest.json
          if-no-files-found: error

      - name: Materialize release telemetry export
        shell: bash
        env:
          SDKWORK_RELEASE_TELEMETRY_EXPORT_PATH: docs/release/release-telemetry-export-latest.json
          SDKWORK_RELEASE_TELEMETRY_EXPORT_JSON: ${{ vars.SDKWORK_RELEASE_TELEMETRY_EXPORT_JSON || '' }}
          SDKWORK_RELEASE_TELEMETRY_GATEWAY_PROMETHEUS_TEXT: ${{ vars.SDKWORK_RELEASE_TELEMETRY_GATEWAY_PROMETHEUS_TEXT || '' }}
          SDKWORK_RELEASE_TELEMETRY_ADMIN_PROMETHEUS_TEXT: ${{ vars.SDKWORK_RELEASE_TELEMETRY_ADMIN_PROMETHEUS_TEXT || '' }}
          SDKWORK_RELEASE_TELEMETRY_PORTAL_PROMETHEUS_TEXT: ${{ vars.SDKWORK_RELEASE_TELEMETRY_PORTAL_PROMETHEUS_TEXT || '' }}
          SDKWORK_RELEASE_TELEMETRY_SUPPLEMENTAL_TARGETS_JSON: ${{ vars.SDKWORK_RELEASE_TELEMETRY_SUPPLEMENTAL_TARGETS_JSON || '' }}
          SDKWORK_RELEASE_TELEMETRY_GENERATED_AT: ${{ vars.SDKWORK_RELEASE_TELEMETRY_GENERATED_AT || '' }}
          SDKWORK_RELEASE_TELEMETRY_SOURCE_KIND: ${{ vars.SDKWORK_RELEASE_TELEMETRY_SOURCE_KIND || 'observability-control-plane' }}
          SDKWORK_RELEASE_TELEMETRY_SOURCE_PROVENANCE: ${{ vars.SDKWORK_RELEASE_TELEMETRY_SOURCE_PROVENANCE || '' }}
          SDKWORK_RELEASE_TELEMETRY_SOURCE_FRESHNESS_MINUTES: ${{ vars.SDKWORK_RELEASE_TELEMETRY_SOURCE_FRESHNESS_MINUTES || '' }}
        run: node scripts/release/materialize-release-telemetry-export.mjs

      - name: Upload release telemetry export governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-telemetry-export
          path: docs/release/release-telemetry-export-latest.json
          if-no-files-found: error

      - name: Materialize release telemetry snapshot
        shell: bash
        env:
          SDKWORK_RELEASE_TELEMETRY_EXPORT_PATH: docs/release/release-telemetry-export-latest.json
        run: node scripts/release/materialize-release-telemetry-snapshot.mjs

      - name: Upload release telemetry snapshot governance artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-telemetry-snapshot
          path: docs/release/release-telemetry-snapshot-latest.json
          if-no-files-found: error

      - name: Materialize SLO governance evidence
        shell: bash
        env:
          SDKWORK_RELEASE_TELEMETRY_SNAPSHOT_PATH: docs/release/release-telemetry-snapshot-latest.json
        run: node scripts/release/materialize-slo-governance-evidence.mjs

      - name: Upload SLO governance evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-slo-evidence
          path: docs/release/slo-governance-latest.json
          if-no-files-found: error

      - name: Materialize release governance bundle
        shell: bash
        run: node scripts/release/materialize-release-governance-bundle.mjs

      - name: Upload release governance bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-bundle
          path: artifacts/release-governance-bundle/**/*
          if-no-files-found: error

      - name: Generate governance evidence attestation
        if: ${{ !github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            docs/release/release-window-snapshot-latest.json
            docs/release/release-sync-audit-latest.json
            docs/release/release-telemetry-export-latest.json
            docs/release/release-telemetry-snapshot-latest.json
            docs/release/slo-governance-latest.json

      - name: Run release governance gate
        shell: bash
        env:
          SDKWORK_API_ROUTER_GIT_REF: ${{ needs.prepare.outputs.git_ref }}
          SDKWORK_CORE_GIT_REF: ${{ vars.SDKWORK_CORE_GIT_REF || 'main' }}
          SDKWORK_UI_GIT_REF: ${{ vars.SDKWORK_UI_GIT_REF || 'main' }}
          SDKWORK_APPBASE_GIT_REF: ${{ vars.SDKWORK_APPBASE_GIT_REF || 'main' }}
          SDKWORK_CRAW_CHAT_SDK_GIT_REF: ${{ vars.SDKWORK_CRAW_CHAT_SDK_GIT_REF || 'main' }}
          SDKWORK_RELEASE_WINDOW_SNAPSHOT_PATH: docs/release/release-window-snapshot-latest.json
          SDKWORK_RELEASE_SYNC_AUDIT_PATH: docs/release/release-sync-audit-latest.json
        run: node scripts/release/run-release-governance-checks.mjs --format json

  native-release:
    name: Native release (${{ matrix.platform }}-${{ matrix.arch }})
    needs:
      - prepare
      - rust-dependency-audit
      - product-verification
      - governance-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            platform: windows
            arch: x64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
          - runner: ubuntu-22.04
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
          - runner: macos-14
            platform: macos
            arch: arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            apps/sdkwork-router-admin/pnpm-lock.yaml
            apps/sdkwork-router-portal/pnpm-lock.yaml

      - name: Materialize external release dependencies
        shell: bash
        env:
          SDKWORK_RELEASE_EXTERNAL_DEPENDENCY_SCOPE: referenced
          SDKWORK_CORE_GIT_REF: ${{ vars.SDKWORK_CORE_GIT_REF || 'main' }}
          SDKWORK_UI_GIT_REF: ${{ vars.SDKWORK_UI_GIT_REF || 'main' }}
          SDKWORK_APPBASE_GIT_REF: ${{ vars.SDKWORK_APPBASE_GIT_REF || 'main' }}
          SDKWORK_CRAW_CHAT_SDK_GIT_REF: ${{ vars.SDKWORK_CRAW_CHAT_SDK_GIT_REF || 'main' }}
        run: node scripts/release/materialize-external-deps.mjs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install native workspace dependencies
        shell: bash
        run: |
          pnpm --dir apps/sdkwork-router-admin install --frozen-lockfile
          pnpm --dir apps/sdkwork-router-portal install --frozen-lockfile

      - name: Build release service binaries on Windows
        if: matrix.platform == 'windows'
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
          HOST_CMAKE_GENERATOR: Visual Studio 17 2022
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p admin-api-service -p gateway-service -p portal-api-service -p router-web-service -p router-product-service

      - name: Build release service binaries on Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p admin-api-service -p gateway-service -p portal-api-service -p router-web-service -p router-product-service

      - name: Build portal desktop release
        shell: bash
        run: node scripts/release/run-desktop-release-build.mjs --app portal --target ${{ matrix.target }}

      - name: Collect native release assets
        shell: bash
        run: node scripts/release/package-release-assets.mjs native --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --output-dir artifacts/release

      - name: Run installed native runtime smoke on Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: node scripts/release/run-windows-installed-runtime-smoke.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --evidence-path artifacts/release-governance/windows-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload Windows installed runtime smoke evidence
        if: ${{ always() && matrix.platform == 'windows' && hashFiles(format('artifacts/release-governance/windows-installed-runtime-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-windows-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release-governance/windows-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Generate Windows smoke evidence attestation
        if: ${{ (!github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true') && matrix.platform == 'windows' && hashFiles(format('artifacts/release-governance/windows-installed-runtime-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release-governance/windows-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Run installed native runtime smoke on Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: node scripts/release/run-unix-installed-runtime-smoke.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --evidence-path artifacts/release-governance/unix-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload Unix installed runtime smoke evidence
        if: ${{ always() && matrix.platform != 'windows' && hashFiles(format('artifacts/release-governance/unix-installed-runtime-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-unix-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release-governance/unix-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Generate Unix smoke evidence attestation
        if: ${{ (!github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true') && matrix.platform != 'windows' && hashFiles(format('artifacts/release-governance/unix-installed-runtime-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release-governance/unix-installed-runtime-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Run Linux Docker Compose packaged product smoke
        if: matrix.platform == 'linux'
        shell: bash
        run: node scripts/release/run-linux-docker-compose-smoke.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --bundle-path artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz --evidence-path artifacts/release-governance/docker-compose-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload Linux Docker Compose smoke evidence
        if: ${{ always() && matrix.platform == 'linux' && hashFiles(format('artifacts/release-governance/docker-compose-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-docker-compose-smoke-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release-governance/docker-compose-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Generate Linux Docker Compose smoke evidence attestation
        if: ${{ (!github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true') && matrix.platform == 'linux' && hashFiles(format('artifacts/release-governance/docker-compose-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release-governance/docker-compose-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Run Linux Helm render packaged smoke
        if: matrix.platform == 'linux'
        shell: bash
        run: node scripts/release/run-linux-helm-render-smoke.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --bundle-path artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz --evidence-path artifacts/release-governance/helm-render-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload Linux Helm render smoke evidence
        if: ${{ always() && matrix.platform == 'linux' && hashFiles(format('artifacts/release-governance/helm-render-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-helm-render-smoke-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release-governance/helm-render-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json
          if-no-files-found: error

      - name: Generate Linux Helm render smoke evidence attestation
        if: ${{ (!github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true') && matrix.platform == 'linux' && hashFiles(format('artifacts/release-governance/helm-render-smoke-{0}-{1}.json', matrix.platform, matrix.arch)) != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release-governance/helm-render-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json

      - name: Upload official release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256.txt
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.manifest.json
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/desktop/portal/sdkwork-router-portal-desktop-*
          if-no-files-found: error

      - name: Generate native release assets attestation
        if: ${{ !github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256.txt
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/bundles/sdkwork-api-router-product-server-${{ matrix.platform }}-${{ matrix.arch }}.manifest.json
            artifacts/release/native/${{ matrix.platform }}/${{ matrix.arch }}/desktop/portal/sdkwork-router-portal-desktop-*

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - governance-release
      - native-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-native-*
          path: artifacts/release
          merge-multiple: true

      - name: Generate release catalog
        run: node scripts/release/materialize-release-catalog.mjs --release-tag ${{ needs.prepare.outputs.release_tag }} --assets-root artifacts/release --output artifacts/release/release-catalog.json

      - name: Generate release catalog attestation
        if: ${{ !github.event.repository.private || vars.SDKWORK_RELEASE_ARTIFACT_ATTESTATIONS_ENABLED == 'true' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/release-catalog.json

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: SDKWork API Router ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            artifacts/release/**/sdkwork-api-router-product-server-*.tar.gz
            artifacts/release/**/sdkwork-api-router-product-server-*.tar.gz.sha256.txt
            artifacts/release/**/sdkwork-api-router-product-server-*.manifest.json
            artifacts/release/**/desktop/portal/sdkwork-router-portal-desktop-*
            artifacts/release/release-catalog.json
