{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sdkwork-api-router.secretName" . }}
  labels:
    {{- include "sdkwork-api-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  SDKWORK_DATABASE_URL: {{ required "secrets.databaseUrl is required unless secrets.existingSecret is set" .Values.secrets.databaseUrl | quote }}
  SDKWORK_ADMIN_JWT_SIGNING_SECRET: {{ required "secrets.adminJwtSigningSecret is required unless secrets.existingSecret is set" .Values.secrets.adminJwtSigningSecret | quote }}
  SDKWORK_PORTAL_JWT_SIGNING_SECRET: {{ required "secrets.portalJwtSigningSecret is required unless secrets.existingSecret is set" .Values.secrets.portalJwtSigningSecret | quote }}
  SDKWORK_CREDENTIAL_MASTER_KEY: {{ required "secrets.credentialMasterKey is required unless secrets.existingSecret is set" .Values.secrets.credentialMasterKey | quote }}
  SDKWORK_METRICS_BEARER_TOKEN: {{ required "secrets.metricsBearerToken is required unless secrets.existingSecret is set" .Values.secrets.metricsBearerToken | quote }}
{{- end }}
